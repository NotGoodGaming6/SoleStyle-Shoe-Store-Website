<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="100%" height="100%" fill="none">
  <!-- Brand Gradient definition matching the website's primary-500 to primary-600 -->
  <defs>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4272ff" />
      <stop offset="100%" stop-color="#2D2A7B" />
    </linearGradient>
    
    <!-- Premium glow filter for high-end appearance in browser tabs -->
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#4272ff" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Rounded rectangle background with exact brand gradient -->
  <rect x="1" y="1" width="22" height="22" rx="6" fill="url(#brand-grad)" />

  <!-- Exact brand lightning bolt logo mark from the site header, styled in pure white outline -->
  <path 
    d="M13 10V3L4 14h7v7l9-11h-7z" 
    stroke="#ffffff" 
    stroke-width="2.2" 
    stroke-linecap="round" 
    stroke-linejoin="round" 
    fill="none"
    filter="url(#glow)"
  />
</svg>